# Liberty Canvas — quality gate (type safety, unit tests, CWV, e2e)
# Paths are App Router truth: /discover/[locale], not /{locale}/…

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # ----------------------------------------------------
  # Static analysis + domain tests + production build
  # Single job → one npm ci / one build (no wasted matrix)
  # ----------------------------------------------------
  quality:
    name: Static analysis, tests & build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      - name: Unit / domain tests (Vitest)
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            public
            package.json
            package-lock.json
            next.config.mjs
            vercel.json
          retention-days: 1

  # ----------------------------------------------------
  # Lighthouse — realistic CWV gates (not fantasy 1.00)
  # Uses repo script + discover/ja (not /ja)
  # ----------------------------------------------------
  lighthouse:
    name: Lighthouse CWV & SEO gate
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Next.js build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Start production server
        run: npm run start -- -p 3000 &

      - name: Wait for server
        run: |
          for i in $(seq 1 40); do
            if curl -sf -o /dev/null http://127.0.0.1:3000/; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to become ready" >&2
          exit 1

      - name: Lighthouse CI
        run: LIGHTHOUSE_BASE_URL=http://127.0.0.1:3000 npm run lighthouse:ci
        env:
          # Achievable cold-start gates on GitHub runners (see scripts/lighthouse-ci.mjs)
          LH_MIN_PERFORMANCE: "0.68"
          LH_MIN_ACCESSIBILITY: "0.90"
          LH_MIN_BP: "0.85"
          LH_MIN_SEO: "0.90"

  # ----------------------------------------------------
  # Playwright e2e against the same build artifact
  # ----------------------------------------------------
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Next.js build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run e2e
        env:
          CI: "true"
